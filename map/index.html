            rel="stylesheet"
        />
        <link rel="stylesheet" href="../assets/styles/main.css" />
    </head>
    <body data-page="map">
        <div class="page-shell">
            <aside class="sidebar">
                <div class="sidebar__inner">
                    <p class="eyebrow">Zhery Region</p>
                    <h1>Pokemon Light Platinum DS</h1>
                    <p class="version">Version 0.2.1</p>
                    <p class="sidebar__intro">
                        Region markers, route spacing, and location hover
                        references.
                    </p>
                    <nav class="sidebar__nav" aria-label="Guide Sections">
                        <a href="../index.html" data-page-link="overview"
                            >Overview</a
                        >
                        <a
                            href="../guides/pokemons.html"
                            data-page-link="pokemons"
                            >Pokemons</a
                        >
                        <a href="../routes/index.html" data-page-link="routes"

                        >
                        <a
                            href="../locations/index.html"
                            data-page-link="locations"
                            >Locations</a

                        <a href="index.html" data-page-link="map">Map</a>
                        <a href="../items/index.html" data-page-link="items"
                            >Items</a
                        >
                        <a href="../others/index.html" data-page-link="others"
                            >Others</a
                        >
                    </nav>
                </div>
            </aside>

            <main class="content">
                <section class="panel page-intro">
                    <p class="eyebrow">Region Map</p>
                    <h2>Zhery Map</h2>
                    <p class="section-copy">
                        Hover over the marked town and city boxes to inspect
                        placeholder labels.
                    </p>
                </section>

                <section class="panel map-section">
                    <div class="map-board" data-map-board>
                        <img
                            src="../assets/pictures/MainMap.png"
                            alt="Zhery region map with town and city markers"
                        />

                        <button
                            class="map-hotspot"
                            style="
                                left: 37%;
                                top: 4%;
                                width: 9.5%;
                                height: 12.5%;
                            "
                            aria-label="Location Placeholder 1"
                        >
                            <span class="map-hotspot__label"
                                >Location Placeholder 1</span
                            >
                        </button>

                        <button
                            class="map-hotspot"
                            style="
                                left: 16%;
                                top: 20.6%;
                                width: 9.5%;
                                height: 8.5%;
                            "
                            aria-label="Location Placeholder 2"
                        >
                            <span class="map-hotspot__label"
                                >Location Placeholder 2</span
                            >
                        </button>

                        <button
                            class="map-hotspot"
                            style="
                                left: 3.9%;
                                top: 44%;
                                width: 4.8%;
                                height: 12%;
                            "
                            aria-label="Location Placeholder 3"
                        >
                            <span class="map-hotspot__label"
                                >Location Placeholder 3</span
                            >
                        </button>

                        <button
                            class="map-hotspot"
                            style="
                                left: 45%;
                                top: 44.6%;
                                width: 10.3%;
                                height: 12%;
                            "
                            aria-label="Location Placeholder 4"
                        >
                            <span class="map-hotspot__label"
                                >Location Placeholder 4</span
                            >
                        </button>

                        <button
                            class="map-hotspot"
                            style="
                                left: 15.5%;
                                top: 66.2%;
                                width: 9.5%;
                                height: 12%;
                            "
                            aria-label="Location Placeholder 5"
                        >
                            <span class="map-hotspot__label"
                                >Location Placeholder 5</span
                            >
                        </button>

                        <button
                            class="map-hotspot"
                            style="
                                left: 57.9%;
                                top: 77.5%;
                                width: 9.5%;
                                height: 7.8%;
                            "
                            aria-label="Location Placeholder 6"
                        >
                            <span class="map-hotspot__label"
                                >Location Placeholder 6</span
                            >
                        </button>

                        <button
                            class="map-hotspot map-hotspot--fixed"
                            style="
                                left: 14.5%;
                                top: 87%;
                                width: 8%;
                                height: 10%;
                            "
                            aria-label="Location Placeholder 7"
                        >
                            <span class="map-hotspot__label"
                                >Location Placeholder 7</span
                            >
                        </button>
                    </div>
                </section>
            </main>
        </div>

        <script src="../assets/script.js"></script>

</html>
